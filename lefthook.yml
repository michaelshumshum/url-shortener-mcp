pre-commit:
  commands:
    biome:
      glob: "*.{js,ts,jsx,tsx,json,md}"
      run: pnpm biome check --write {staged_files}
      stage_fixed: true
    prisma-format:
      glob: "*.prisma"
      run: pnpm prisma format
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: pnpm commitlint --edit .git/COMMIT_EDITMSG
